; Custom PHP settings for this project
display_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED

; File upload limits - increased for large dental scan files (STL, etc.)
upload_max_filesize = 100M
post_max_size = 500M
max_file_uploads = 20
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
