; Custom PHP settings for this project
display_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED

; File upload limits
; With GCS direct uploads, large files bypass Cloud Run entirely.
; These modest limits cover small uploads (logos) and form metadata only.
upload_max_filesize = 10M
post_max_size = 20M
max_file_uploads = 20
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
